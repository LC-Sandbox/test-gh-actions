name: SQL Guard

on:
  pull_request:
    branches:
      - master
      - '[0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - '[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]'
      
  push:
    branches:
      - master
      - '[0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - '[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]'
permissions:
  contents: read
  
jobs:
  sql-guard:
    name: SQL Guard
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.SQL_GUARD_APP_ID }}
          private-key: ${{ secrets.SQL_GUARD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Run SQL Guard
        uses: LC-Sandbox/lc-github-actions/check-sql@master
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          exempt-teams: "dba ort"
          exempt-actors: "jenkins-ci[bot]"
          exclude-paths: "ignore-sql"
          utf8-bom-check: "false"